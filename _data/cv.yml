  summary: >
    Postdoctoral researcher working on relativistic astrophysics and
    gravitational-wave multi-messenger astronomy. My research focuses on
    binary neutron-star mergers, gravitational lensing of gravitational waves,
    compact-binary populations, short gamma-ray bursts, and electromagnetic
    counterparts of compact-object mergers.

